version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-hiking-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_hiking
      POSTGRES_USER: ai_hiking
      POSTGRES_PASSWORD: ai_hiking
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_hiking"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-hiking-net

  redis:
    image: redis:7-alpine
    container_name: ai-hiking-redis
    ports:
      - "5379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-hiking-net

volumes:
  pgdata:
  redis-data:

networks:
  ai-hiking-net:
    driver: bridge
