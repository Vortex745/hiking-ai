name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_IMAGE: zijinn123/ai-hiking

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    name: Prepare image metadata
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.vars.outputs.image_repository }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Compute image metadata
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          echo "image_repository=${DOCKERHUB_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate services
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - name: Validate gateway
        working-directory: gateway
        run: go test ./...

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate AI service syntax
        working-directory: ai-service
        run: python -m compileall -q .

      - name: Validate compose files
        run: |
          DOCKERHUB_IMAGE=${{ needs.meta.outputs.image_repository || 'zijinn123/ai-hiking' }} IMAGE_TAG=latest docker compose -f docker-compose.prod.yml config --quiet

  build:
    name: Build and push ${{ matrix.service }}
    needs:
      - meta
      - validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ai-service
            context: ./ai-service
            dockerfile: ./ai-service/Dockerfile
          - service: gateway
            context: ./gateway
            dockerfile: ./gateway/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.meta.outputs.image_repository }}
          tags: |
            type=raw,value=${{ matrix.service }}-sha-${{ needs.meta.outputs.short_sha }}
            type=raw,value=${{ matrix.service }}-latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  publish-runtime-images:
    name: Publish runtime image ${{ matrix.name }}
    needs:
      - meta
      - validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: redis
            source: redis:7-alpine
            target: runtime-redis-7-alpine
          - name: pgvector
            source: pgvector/pgvector:pg16
            target: runtime-pgvector-pg16
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish image to Docker Hub
        shell: bash
        run: |
          set -euo pipefail
          source_image='${{ matrix.source }}'
          target_image='${{ needs.meta.outputs.image_repository }}:${{ matrix.target }}'
          docker pull "$source_image"
          docker tag "$source_image" "$target_image"
          docker push "$target_image"

  deploy:
    name: Deploy to server
    needs:
      - meta
      - build
      - publish-runtime-images
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload production compose file
        shell: bash
        run: |
          set -euo pipefail
          remote="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" "$remote" "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          scp -i ~/.ssh/deploy_key -P "${{ secrets.DEPLOY_PORT }}" docker-compose.prod.yml "$remote:${{ secrets.DEPLOY_PATH }}/docker-compose.prod.yml"

      - name: Upload production environment
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          RERANK_API_KEY: ${{ secrets.RERANK_API_KEY }}
        run: |
          set -euo pipefail
          test -n "$OPENAI_API_KEY"
          test -n "$EMBEDDING_API_KEY"
          test -n "$RERANK_API_KEY"
          cat > .env.production <<ENV
          OPENAI_BASE_URL=https://api.deepseek.com/v1
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=deepseek-v4-flash
          EMBEDDING_BASE_URL=https://api.edgefn.net/v1
          EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
          EMBEDDING_MODEL=BAAI/bge-m3
          EMBEDDING_DIMENSIONS=1024
          RERANK_BASE_URL=https://api.edgefn.net/v1
          RERANK_API_KEY=${RERANK_API_KEY}
          RERANK_MODEL=bge-reranker-v2-m3
          RERANK_ENABLED=true
          ENV
          chmod 600 .env.production
          remote="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          scp -i ~/.ssh/deploy_key -P "${{ secrets.DEPLOY_PORT }}" .env.production "$remote:${{ secrets.DEPLOY_PATH }}/.env"
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" "$remote" "chmod 600 '${{ secrets.DEPLOY_PATH }}/.env'"
          rm -f .env.production

      - name: Pull images and restart services
        shell: bash
        run: |
          set -euo pipefail
          remote="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" "$remote" <<'REMOTE'
            set -euo pipefail
            cd '${{ secrets.DEPLOY_PATH }}'
            DOCKERHUB_IMAGE='${{ needs.meta.outputs.image_repository }}' IMAGE_TAG='sha-${{ needs.meta.outputs.short_sha }}' docker compose -f docker-compose.prod.yml pull
            DOCKERHUB_IMAGE='${{ needs.meta.outputs.image_repository }}' IMAGE_TAG='sha-${{ needs.meta.outputs.short_sha }}' docker compose -f docker-compose.prod.yml up -d --remove-orphans
            DOCKERHUB_IMAGE='${{ needs.meta.outputs.image_repository }}' IMAGE_TAG='sha-${{ needs.meta.outputs.short_sha }}' docker compose -f docker-compose.prod.yml ps
          REMOTE
